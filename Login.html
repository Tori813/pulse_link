<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Login</title>
        <link rel="stylesheet" href="Create An Account.css">
    </head>
    <body>
        <h1>Welcome Back!</h1>
        <p>Please log in to your account</p>
        <form>
        <div class="form-container">
            <fieldset>
                <legend>Account Information</legend>
                <label for="first name">First Name:</label>
                <input id="first name" placeholder="Enter your first name"></input>
                <label for="last name">Last Name:</label>
                <input id="last name" placeholder="last name"></input>
                 <label for="email">Email: </label> 
                 <input id="email" placeholder="Enter your email"></input>
                 <label for="password">Password: </label> 
                 <input id="password" type="password" placeholder="Enter your password"></input>
            </fieldset>
            <fieldset>
                 <label><input type="checkbox" class="checkbox"></input> <b>Remember me</b></label>
            </fieldset>
            <fieldset>
                 <input type="submit" value="LOG IN"></input>
            </fieldset>
        </div>
            <p><b>Don't have an account?</b> <a href="Create An Account.html">Create one</a></p>
        </form>
